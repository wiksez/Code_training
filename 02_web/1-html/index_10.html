<!DOCTYPE html>
<html>
    <head>
        <title>Forms</title>
    </head>
    <body>
        <form>
            <p>Name: <input type="text"></p>
            <p>Age: <input type="number"></p>
            <p>Favourite colour:
                <select>
                    <option>Red</option>
                    <option>Yellow</option>
                    <option>Green</option>
                    <option selected>Blue</option>
                </select>
            </p>
        </form>
    </body>
</html>
