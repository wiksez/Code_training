<!DOCTYPE html>
<html>
    <head>
        <title>Floats</title>
        <style type="text/css">
            #left {
                float:left
            }
            #right {
                float: right
            }
            #underneath {
                clear: both
            }
        </style>
    </head>
    <body>
        <div id="background">
            <p id="left">This is paragraph</p>
            <p id="right">This is another paragraph.</p>
            <p id="underneath">This is yet another paragraph!</p>
        </div> 
    </body>
</html>
